<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Homelab OS</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <!-- Critical layout: must work even if the Vite CSS bundle fails to load -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1e2e;
      --taskbar-bg: rgba(24, 24, 37, 0.85);
      --text: #cdd6f4;
      --accent: #89b4fa;
      --border: rgba(255, 255, 255, 0.05);
      --tb-h: 48px;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      flex: 0 0 var(--tb-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--tb-h);
      padding: 0 20px;
      background: var(--taskbar-bg);
      border-bottom: 1px solid var(--border);
      box-sizing: border-box;
    }
    .workspace-viewport {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }
    .boot-error[hidden] {
      display: none !important;
      pointer-events: none;
    }
    .boot-error:not([hidden]) {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: #f38ba8;
      z-index: 100;
    }
    body.booting .workspace-viewport { visibility: hidden; }
    #modal-root[hidden] { display: none !important; }
  </style>
</head>
<body class="theme-dark booting">
  <div id="boot-error" class="boot-error" hidden></div>
  <header class="top-bar size-medium" id="taskbar">Loading…</header>
  <main class="workspace-viewport" id="workspace-viewport">
    <div class="workspace-slider" id="workspace-slider"></div>
  </main>
  <div id="modal-root" hidden></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Widget</title>
  <style>
    :root { color-scheme: dark; --accent: #89b4fa; --text: #cdd6f4; --muted: #a6adc8; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, sans-serif;
      background: transparent;
      color: var(--text);
    }
    body { padding: 8px 10px; }
    h2 { margin: 0 0 6px; font-size: 0.95rem; color: var(--accent); }
    .stat { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.8rem; line-height: 1.4; }
  </style>
</head>
<body>
  <h2 id="title">Demo Widget</h2>
  <div class="stat" id="cpu">CPU: waiting for SSE…</div>
  <script src="/static/sdk/homelabos-sdk.js"></script>
  <script>
    (function () {
      function boot() {
        var titleEl = document.getElementById('title');
        var cpuEl = document.getElementById('cpu');
        if (!window.HomelabOS) {
          cpuEl.textContent = 'SDK failed to load';
          return;
        }
        var cfg = HomelabOS.getConfig();
        if (cfg.title) titleEl.textContent = cfg.title;

        HomelabOS.subscribe('system.stats', function (data) {
          cpuEl.textContent =
            'CPU: ' + Number(data.cpu_percent).toFixed(1) + '% · RAM: ' +
            Number(data.mem_percent).toFixed(1) + '%';
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>

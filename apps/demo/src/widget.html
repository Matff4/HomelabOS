<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Widget</title>
  <style>
    :root { color-scheme: dark; --accent: #89b4fa; --text: #cdd6f4; --muted: #a6adc8; }
    body {
      margin: 0;
      padding: 12px;
      font-family: system-ui, sans-serif;
      background: transparent;
      color: var(--text);
    }
    h2 { margin: 0 0 8px; font-size: 1rem; color: var(--accent); }
    .stat { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.85rem; }
  </style>
  <script src="/static/sdk/homelabos-sdk.js"></script>
</head>
<body>
  <h2 id="title">Demo Widget</h2>
  <div class="stat" id="cpu">CPU: waiting for SSE…</div>
  <script>
    const titleEl = document.getElementById('title');
    const cpuEl = document.getElementById('cpu');
    const cfg = HomelabOS.getConfig();
    if (cfg.title) titleEl.textContent = cfg.title;

    HomelabOS.subscribe('system.stats', (data) => {
      cpuEl.textContent = `CPU: ${Number(data.cpu_percent).toFixed(1)}% · RAM: ${Number(data.mem_percent).toFixed(1)}%`;
    });
  </script>
</body>
</html>

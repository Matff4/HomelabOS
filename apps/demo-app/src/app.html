<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About HomelabOS</title>
  <style>
    :root { color-scheme: dark; --accent: #89b4fa; --text: #cdd6f4; --muted: #a6adc8; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: auto;
      font-family: system-ui, sans-serif;
      background: var(--bg, #1e1e2e);
      color: var(--text);
    }
    .page {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px 24px;
      box-sizing: border-box;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: clamp(1.5rem, 4vw, 2.2rem); color: #fff; font-weight: 600; }
    p { margin: 0 0 10px; color: var(--muted); line-height: 1.55; max-width: 36rem; }
    .meta { font-size: 0.9rem; font-variant-numeric: tabular-nums; color: var(--muted); }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <h1>About HomelabOS</h1>
      <p>Launched from a 1×1 homescreen icon — this view fills the workspace below the taskbar, like your legacy PoC.</p>
      <p class="meta" id="platform">Loading platform info…</p>
      <p class="meta" id="api">Loading plugin API…</p>
      <p class="meta">Close via the taskbar ✕ or HomelabOS.closeApp()</p>
    </div>
  </div>
  <script src="/sdk/homelabos-sdk.js"></script>
  <script>
    (function () {
      function api() {
        if (!window.HomelabOS) return null;
        return typeof window.HomelabOS.fetch === 'function'
          ? window.HomelabOS
          : window.HomelabOS.HomelabOS || null;
      }
      function boot() {
        var sdk = api();
        if (!sdk) return;
        var p = sdk.platform;
        document.getElementById('platform').textContent =
          'Core ' + p.coreVersion + ' · API v' + p.pluginApiVersion + ' · SDK ' + p.sdkVersion;
        sdk.fetch('/api/plugins/demo-app/info')
          .then(function (r) { return r.json(); })
          .then(function (data) {
            document.getElementById('api').textContent = data.message || 'API ok';
          })
          .catch(function () {
            document.getElementById('api').textContent = 'API unreachable';
          });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
      else boot();
    })();
  </script>
</body>
</html>
